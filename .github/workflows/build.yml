name: Pergola Site Builder
on:
  # Plus de cron fixe : c'est le workflow "Random scheduler (daily article)"
  # qui déclenche ce build à une heure aléatoire entre 6h et 14h Paris.
  # Cela évite la signature "publié exactement à 7h tous les jours" aux yeux de Google.
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode : full (site complet), blog (article quotidien), fix (MAJ templates sans API), comments (commentaires du jour)'
        required: true
        default: 'blog'
        type: choice
        options:
          - blog
          - full
          - fix
          - comments
          - reset-images
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer les dépendances
        run: pip install anthropic
      - name: Construire le site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'blog' }}"
          python build_site.py $MODE
      - name: Commit et push
        run: |
          git config user.name "Pergola Bot"
          git config user.email "bot@pergola-guide.fr"
          git add -A
          git diff --staged --quiet || git commit -m "🌿 Mise à jour site - $(date +'%d/%m/%Y')"
          # Rebase sur les changements distants avant de pusher (évite les conflits)
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }}
        env:
          MODE: ${{ github.event.inputs.mode || 'blog' }}
